  <main class="page-content">
    <section class="container contact-section">
      <h2>제휴 및 코스 제보</h2>
      <p class="section-desc">새로운 코스를 추천하고 싶거나 제휴 문의가 있으시면 아래 양식을 작성해주세요.</p>
      
      <form action="https://formspree.io/f/mgopalbg" method="POST" class="contact-form">
        <div class="form-group">
          <label for="name">성함</label>
          <input type="text" id="name" name="name" required placeholder="성함을 입력하세요">
        </div>
        <div class="form-group">
          <label for="email">이메일</label>
          <input type="email" id="email" name="email" required placeholder="이메일 주소를 입력하세요">
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" rows="6" required placeholder="내용을 상세히 입력해주세요"></textarea>
        </div>
        <button type="submit" id="submit-btn">보내기</button>
      </form>
    </section>
