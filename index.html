<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 생성기 & 동물상 테스트</title>
  <link href="style.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
  <div class="container">
    <button id="theme-toggle" class="theme-btn">🌙</button>
    <h1>로또 번호 생성기</h1>
    <div id="lotto-numbers" class="numbers-container">
      <div class="ball">?</div>
      <div class="ball">?</div>
      <div class="ball">?</div>
      <div class="ball">?</div>
      <div class="ball">?</div>
      <div class="ball">?</div>
    </div>
    <button id="generate-btn">번호 생성하기</button>
  </div>

  <div class="container animal-test-section">
    <h1>동물상 테스트</h1>
    <p>내 얼굴은 강아지상? 고양이상?</p>
    <div class="upload-area" id="upload-area" onclick="document.getElementById('image-upload').click()">
      <p id="upload-label">여기를 눌러 사진을 업로드하세요</p>
      <img id="preview-img" style="display: none; width: 100%; border-radius: 8px;">
    </div>
    <input type="file" id="image-upload" accept="image/*" style="display: none;">
    <div id="result-container" style="margin-top: 1.5rem; display: none;">
      <h2 id="prediction-label">분석 결과: </h2>
      <div id="label-container" class="label-container"></div>
    </div>
  </div>

  <div class="container contact-section">
    <h2>제휴 문의</h2>
    <form action="https://formspree.io/f/mgopalbg" method="POST" class="contact-form">
      <div class="form-group">
        <label for="name">성함</label>
        <input type="text" id="name" name="name" required placeholder="성함을 입력하세요">
      </div>
      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" name="email" required placeholder="이메일 주소를 입력하세요">
      </div>
      <div class="form-group">
        <label for="message">문의 내용</label>
        <textarea id="message" name="message" rows="4" required placeholder="제휴 문의 내용을 적어주세요"></textarea>
      </div>
      <button type="submit" id="submit-btn">문의 보내기</button>
    </form>
  </div>

  <div class="container">
    <div id="disqus_thread"></div>
    <script>
        /**
        *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
        *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */

        this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
        this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
        };
        */
        (function() { // DON'T EDIT BELOW THIS LINE
        var d = document, s = d.createElement('script');
        s.src = 'https://product-builder-9v8finuenk.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
        })();
    </script>
    <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
  </div>

  <script defer type="text/javascript" src="main.js"></script>
</body>
</html>
