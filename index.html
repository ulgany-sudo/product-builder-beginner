<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘 저녁 어디 뛰지 - 러닝 코스 추천</title>
  <meta name="google-adsense-account" content="ca-pub-4621143579541891">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4621143579541891"
     crossorigin="anonymous"></script>
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <div class="container main-section">
    <button id="theme-toggle" class="theme-btn">🌙</button>
    <h1>오늘 저녁 어디 뛰지 🏃‍♂️</h1>
    <p>고민하지 말고 버튼을 눌러보세요!</p>
    <div id="course-result" class="course-container" style="display: none;">
      <div class="course-card">
        <h2 id="course-name">코스 이름</h2>
        <div class="course-info">
            <span class="info-item">📍 <span id="course-location">위치</span></span>
            <span class="info-item">📏 <span id="course-distance">거리</span></span>
            <span class="info-item">⚡ <span id="course-difficulty">난이도</span></span>
        </div>
        <p id="course-description">상세 설명</p>
        <div id="course-features" class="feature-tags"></div>
      </div>
    </div>
    <button id="recommend-btn">코스 추천받기</button>
  </div>

  <div class="container contact-section">
    <h2>제휴 및 코스 제보</h2>
    <form action="https://formspree.io/f/mgopalbg" method="POST" class="contact-form">
      <div class="form-group">
        <label for="name">성함</label>
        <input type="text" id="name" name="name" required placeholder="성함을 입력하세요">
      </div>
      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" name="email" required placeholder="이메일 주소를 입력하세요">
      </div>
      <div class="form-group">
        <label for="message">문의 내용</label>
        <textarea id="message" name="message" rows="4" required placeholder="제휴 문의나 새로운 러닝 코스를 제보해주세요"></textarea>
      </div>
      <button type="submit" id="submit-btn">보내기</button>
    </form>
  </div>

  <div class="container">
    <div id="disqus_thread"></div>
    <script>
        (function() { 
        var d = document, s = d.createElement('script');
        s.src = 'https://product-builder-9v8finuenk.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
        })();
    </script>
    <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
  </div>

  <script defer type="text/javascript" src="main.js"></script>
</body>
</html>
