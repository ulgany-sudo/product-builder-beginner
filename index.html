<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 생성기</title>
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <div class="container">
    <button id="theme-toggle" class="theme-btn">🌙</button>
    <h1>로또 번호 생성기</h1>
    <div id="lotto-numbers" class="numbers-container">
      <div class="ball">?</div>
      <div class="ball">?</div>
      <div class="ball">?</div>
      <div class="ball">?</div>
      <div class="ball">?</div>
      <div class="ball">?</div>
    </div>
    <button id="generate-btn">번호 생성하기</button>
  </div>

  <div class="container contact-section">
    <h2>제휴 문의</h2>
    <form action="https://formspree.io/f/mgopalbg" method="POST" class="contact-form">
      <div class="form-group">
        <label for="name">성함</label>
        <input type="text" id="name" name="name" required placeholder="성함을 입력하세요">
      </div>
      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" name="email" required placeholder="이메일 주소를 입력하세요">
      </div>
      <div class="form-group">
        <label for="message">문의 내용</label>
        <textarea id="message" name="message" rows="4" required placeholder="제휴 문의 내용을 적어주세요"></textarea>
      </div>
      <button type="submit" id="submit-btn">문의 보내기</button>
    </form>
  </div>
  <script defer type="text/javascript" src="main.js"></script>
</body>
</html>
