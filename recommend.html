<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>코스 추천 - 오늘 저녁 어디 뛰지</title>
  <link href="style.css" rel="stylesheet">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4621143579541891"
     crossorigin="anonymous"></script>
</head>
<body>
  <header class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">오늘 저녁 어디 뛰지 🏃‍♂️</a>
      <nav class="nav-links">
        <a href="index.html">홈</a>
        <a href="recommend.html" class="active">코스 추천</a>
        <a href="tips.html">러닝 팁</a>
        <a href="about.html">소개</a>
        <a href="contact.html">문의</a>
      </nav>
      <button id="theme-toggle" class="theme-btn-nav">🌙</button>
    </div>
  </header>

  <main class="page-content">
    <section class="container main-section">
      <h2>맞춤형 코스 추천</h2>
      <p class="section-desc">지역을 선택하고 당신의 러닝 스타일에 맞는 최적의 장소를 추천받으세요.</p>
      
      <div class="region-select-container">
          <select id="large-region">
              <option value="">지역 선택(시/도)</option>
              <option value="서울">서울특별시</option>
              <option value="경기">경기도</option>
              <option value="인천">인천광역시</option>
              <option value="강원">강원도</option>
              <option value="충청">충청도</option>
              <option value="전라">전라도</option>
              <option value="경상">경상도</option>
              <option value="제주">제주도</option>
          </select>
          <select id="small-region" disabled>
              <option value="">상세 지역 선택</option>
          </select>
      </div>

      <div id="course-result" class="course-container" style="display: none;">
        <div class="course-card">
          <h3 id="course-name">코스 이름</h3>
          <div class="course-info">
              <span class="info-item">📍 <span id="course-location">위치</span></span>
              <span class="info-item">📏 <span id="course-distance">거리</span></span>
              <span class="info-item">⚡ <span id="course-difficulty">난이도</span></span>
          </div>
          <p id="course-description">상세 설명</p>
          <div id="course-features" class="feature-tags"></div>
        </div>
      </div>
      <button id="recommend-btn">코스 추천받기</button>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-container">
      <div class="footer-links">
        <a href="privacy.html">개인정보처리방침</a>
        <a href="terms.html">이용약관</a>
        <a href="about.html">사이트 소개</a>
        <a href="contact.html">고객센터</a>
      </div>
      <p class="copyright">&copy; 2026 오늘 저녁 어디 뛰지. All rights reserved.</p>
    </div>
  </footer>

  <script defer type="text/javascript" src="main.js"></script>
</body>
</html>
